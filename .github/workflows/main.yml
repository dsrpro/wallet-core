name: Build Wallet Core Android AAR

on:
  workflow_dispatch:  # Permet de lancer manuellement
  push:
    tags:
      - '4.*'

jobs:
  build-android:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Wallet Core
      uses: actions/checkout@v5
      with:
        repository: trustwallet/wallet-core
        ref: 4.6.3
        fetch-depth: 0  # Fetch all history for tags
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        cmdline-tools-version: 9.0
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653'
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          python3 \
          python3-pip \
          protobuf-compiler \
          libprotobuf-dev \
          libssl-dev \
          git \
          curl \
          wget
    
    - name: Setup Environment Variables
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
        echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH
        echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
    
    - name: Verify NDK Installation
      run: |
        echo "NDK Path: $ANDROID_NDK_HOME"
        ls -la $ANDROID_NDK_HOME
        echo "Android SDK contents:"
        ls -la $ANDROID_SDK_ROOT
    
    - name: Explore Project Structure
      run: |
        echo "=== ROOT DIRECTORY ==="
        ls -la
        echo "=== ANDROID DIRECTORY ==="
        ls -la android/
        echo "=== SETTINGS.GRADLE ==="
        cat settings.gradle.kts || cat settings.gradle || echo "No settings.gradle found"
        echo "=== BUILD.GRADLE (ROOT) ==="
        cat build.gradle.kts || cat build.gradle || echo "No build.gradle found"
        if [ -f "android/build.gradle" ]; then
          echo "=== ANDROID/BUILD.GRADLE ==="
          head -50 android/build.gradle
        fi
    
    - name: Build Wallet Core Android with Gradle
      run: |
        echo "Starting Android build with Gradle..."
        cd android
        # Activer le mode verbose pour voir les vraies erreurs
        ./gradlew assembleRelease --no-daemon --stacktrace --info 2>&1 | tee build.log
        BUILD_EXIT_CODE=$?
        
        # Si échec, afficher les dernières lignes avec contexte
        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo "❌ BUILD FAILED"
          echo "=== DERNIÈRES LIGNES DU LOG ==="
          tail -100 build.log
          echo "=== RECHERCHE DES ERREURS ==="
          grep -i "error\|failed\|exception" build.log | tail -50
        fi
        
        exit $BUILD_EXIT_CODE
    
    - name: Find Built AAR
      run: |
        echo "Searching for built AAR files..."
        find . -name "*.aar" -type f | head -20
        if [ -d "android/library/build/outputs/aar" ]; then
          echo "Found AAR in library/build/outputs/aar"
          ls -lh android/library/build/outputs/aar/
        fi
        if [ -d "android/build/outputs/aar" ]; then
          echo "Found AAR in android/build/outputs/aar"
          ls -lh android/build/outputs/aar/
        fi
    
    - name: Upload AAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: wallet-core-android-${{ github.run_number }}
        path: |
          android/library/build/outputs/aar/*.aar
          android/build/outputs/aar/*.aar
          **/library/build/outputs/aar/*.aar
        retention-days: 30
        if-no-files-found: error
    
    - name: Create Release (if tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android/library/build/outputs/aar/*.aar
          android/build/outputs/aar/*.aar
          **/library/build/outputs/aar/*.aar
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
