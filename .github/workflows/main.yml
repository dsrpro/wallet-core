          echo 'TWAnyAddress* wrapTWAnyAddress(TWAnyAddress* anyAddress);'
          echo 'void tw_any_address_delete(TWAnyAddress* anyAddress);'
          echo 'void deleteTWAnyAddress(TWAnyAddress* anyAddress);'
          echo ''
