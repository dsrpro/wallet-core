EOF
echo "✅ Created TWHRP.h"

# ========================================
# 2. WalletCoreRSBindgen.h - Complete Rust FFI bindings
# ========================================
echo ""
echo "=== Creating WalletCoreRSBindgen.h ==="
mkdir -p src/rust/bindgen
cat > src/rust/bindgen/WalletCoreRSBindgen.h << 'EOF'
// Auto-generated Rust FFI bindings for Wallet Core
// Generated for Android ARM64 build

#ifndef WALLETCORE_RS_BINDGEN_H
#define WALLETCORE_RS_BINDGEN_H

#include <stdint.h>
#include <stddef.h>

#ifdef __cplusplus
extern "C" {
#endif

// Opaque types for Rust FFI
typedef struct TWAnyAddress TWAnyAddress;
typedef struct TWPublicKey TWPublicKey;
typedef struct TWPrivateKey TWPrivateKey;
typedef struct TWData TWData;
typedef struct TWString TWString;

// Function declarations from wallet-core-rs
TWAnyAddress* wrapTWAnyAddress(TWAnyAddress* anyAddress);
