          echo '    ICON = 16,'
          echo '    IOV = 17,'
          echo '    KAVA = 18,'
          echo '    KIN = 19,'
          echo '    LITECOIN = 20,'
          echo '    MONACOIN = 21,'
          echo '    NEAR = 22,'
          echo '    NIMIQ = 23,'
          echo '    ONTOLOGY = 24,'
          echo '    POANETWORK = 25,'
          echo '    QTUM = 26,'
          echo '    XRP = 27,'
          echo '    SOLANA = 28,'
          echo '    TERRA = 29,'
