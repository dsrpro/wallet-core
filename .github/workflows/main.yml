name: Build Wallet Core Android AAR

on:
  workflow_dispatch:  # Lancement manuel
  push:
    tags:
      - '4.*'

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Wallet Core
      uses: actions/checkout@v5
      with:
        repository: trustwallet/wallet-core
        ref: 4.6.3
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        cmdline-tools-version: 9.0
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          python3 \
          python3-pip \
          protobuf-compiler \
          libprotobuf-dev \
          libssl-dev \
          git \
          curl \
          wget

    - name: Setup Rust (required for native Rust components)
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        rustc --version
        cargo --version
        rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
        cargo install cargo-ndk

    - name: Patch TWCoinType.h (fix "enum TWHRP" error)
      run: |
        sed -i 's/enum TWHRP TWCoinTypeHRP(/TWHRP TWCoinTypeHRP(/' include/TrustWalletCore/TWCoinType.h
        echo "✅ Patched TWCoinType.h"

    - name: Patch Wrapper.h (fix Rust:: namespace error)
      run: |
        sed -i 's/Rust::tw_data_vector_delete/tw_data_vector_delete/' src/rust/Wrapper.h
        echo "✅ Patched Wrapper.h"

    # Fallback : créer TWHRP.h minimal si absent (pour éviter d'autres erreurs)
    - name: Ensure TWHRP.h exists
      run: |
        if [ ! -f include/TrustWalletCore/TWHRP.h ]; then
          echo "Creating minimal TWHRP.h"
          cat > include/TrustWalletCore/TWHRP.h << 'EOF'
        #ifndef TWHRP_H
        #define TWHRP_H
        #include <string>
        enum HRP {
            UNKNOWN = 0,
            BITCOIN = 1,
            ETHEREUM = 2,
            BINANCE = 3,
            SOLANA = 4,
            COSMOS = 5,
            POLYGON = 6
        };
        typedef enum HRP TWHRP;
        inline std::string hrpName(HRP hrp) { return ""; }
        #endif
        EOF
        fi

    - name: Build Android AAR via Gradle
      run: |
        cd android
        echo "Starting Gradle build for :wallet-core:assembleRelease"
        ./gradlew :wallet-core:assembleRelease --no-daemon --stacktrace

    - name: Find and verify built AAR
      run: |
        echo "Searching for AAR files..."
        find . -name "*.aar" -type f 2>/dev/null | while read aar; do
          echo "Found: $aar"
          ls -lh "$aar"
        done
        if [ ! -f android/wallet-core/build/outputs/aar/*.aar ]; then
          echo "⚠️ No AAR found in expected location. Listing build directories:"
          find android -type d -name "outputs" -exec ls -la {} \;
        fi

    - name: Upload AAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: wallet-core-android-${{ github.run_number }}
        path: |
          android/wallet-core/build/outputs/aar/*.aar
          android/library/build/outputs/aar/*.aar
        retention-days: 30
        if-no-files-found: warn

    - name: Create GitHub Release (if tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android/wallet-core/build/outputs/aar/*.aar
          android/library/build/outputs/aar/*.aar
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
