name: Build Wallet Core Android AAR

on:
  workflow_dispatch:  # Permet de lancer manuellement
  push:
    tags:
      - '4.*'

jobs:
  build-android:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Wallet Core
      uses: actions/checkout@v5
      with:
        repository: trustwallet/wallet-core
        ref: 4.6.3
        fetch-depth: 0  # Fetch all history for tags
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        cmdline-tools-version: 9.0
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653'
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          python3 \
          python3-pip \
          protobuf-compiler \
          libprotobuf-dev \
          libssl-dev \
          git \
          curl \
          wget \
          libboost-all-dev
    
    - name: Setup Boost for Android
      run: |
        echo "📦 Installing Boost for Android cross-compilation..."
        
        # Télécharger Boost 1.82.0 (version stable)
        cd /tmp
        wget -q https://boostorg.jfrog.io/artifactory/main/release/1.82.0/source/boost_1_82_0.tar.gz
        tar -xzf boost_1_82_0.tar.gz
        cd boost_1_82_0
        
        # Bootstrap sans bibliothèques spécifiques (on veut juste les headers)
        ./bootstrap.sh --without-libraries=python,test
        
        # Installer dans un dossier local
        ./b2 install \
          --prefix=/home/runner/work/wallet-core/wallet-core/build/local \
          --build-dir=/tmp/boost-build \
          variant=release \
          link=static \
          threading=multi \
          -j$(nproc) || echo "⚠️ Some Boost components may have failed, continuing..."
        
        # Définir les variables d'environnement pour CMake
        echo "BOOST_ROOT=/home/runner/work/wallet-core/wallet-core/build/local" >> $GITHUB_ENV
        echo "Boost_INCLUDE_DIR=/home/runner/work/wallet-core/wallet-core/build/local/include" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=/home/runner/work/wallet-core/wallet-core/build/local:$CMAKE_PREFIX_PATH" >> $GITHUB_ENV
        
        echo "✅ Boost installation completed"
    
    - name: Setup Environment Variables
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
        echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH
        echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
    
    - name: Verify NDK Installation
      run: |
        echo "NDK Path: $ANDROID_NDK_HOME"
        ls -la $ANDROID_NDK_HOME
        echo "Android SDK contents:"
        ls -la $ANDROID_SDK_ROOT
    
    - name: Explore Project Structure
      run: |
        echo "=== ROOT DIRECTORY ==="
        ls -la
        echo "=== ANDROID DIRECTORY ==="
        ls -la android/
        echo "=== SETTINGS.GRADLE ==="
        cat settings.gradle.kts || cat settings.gradle || echo "No settings.gradle found"
        echo "=== BUILD.GRADLE (ROOT) ==="
        cat build.gradle.kts || cat build.gradle || echo "No build.gradle found"
        if [ -f "android/build.gradle" ]; then
          echo "=== ANDROID/BUILD.GRADLE ==="
          head -50 android/build.gradle
        fi
    
    - name: Build Wallet Core Android with Gradle
      run: |
        echo "Starting Android build with Gradle..."
        
        # Essayer différentes structures de projet
        if [ -d "android" ]; then
          echo "📁 Found android/ directory"
          cd android
        elif [ -f "settings.gradle.kts" ] || [ -f "settings.gradle" ]; then
          echo "📁 Building from root directory"
        else
          echo "❌ No Android project structure found"
          exit 1
        fi
        
        # Afficher la structure
        echo "=== Current directory structure ==="
        pwd
        ls -la
        
        # Activer le mode verbose pour voir les vraies erreurs
        ./gradlew assembleRelease --no-daemon --stacktrace --info 2>&1 | tee build.log
        BUILD_EXIT_CODE=$?
        
        # Si échec, afficher les dernières lignes avec contexte
        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo "❌ BUILD FAILED"
          echo "=== DERNIÈRES LIGNES DU LOG (100 lignes) ==="
          tail -100 build.log
          echo "=== RECHERCHE DES ERREURS (grep) ==="
          grep -i "error\|failed\|exception" build.log | tail -50
        else
          echo "✅ BUILD SUCCESSFUL"
        fi
        
        exit $BUILD_EXIT_CODE
    
    - name: Find Built AAR
      run: |
        echo "Searching for built AAR files..."
        find . -name "*.aar" -type f | head -20
        if [ -d "android/library/build/outputs/aar" ]; then
          echo "Found AAR in library/build/outputs/aar"
          ls -lh android/library/build/outputs/aar/
        fi
        if [ -d "android/build/outputs/aar" ]; then
          echo "Found AAR in android/build/outputs/aar"
          ls -lh android/build/outputs/aar/
        fi
    
    - name: Upload AAR Artifact
      uses: actions/upload-artifact@v4
      if: always()  # Run even if previous steps failed
      with:
        name: wallet-core-android-${{ github.run_number }}
        path: |
          android/library/build/outputs/aar/*.aar
          android/build/outputs/aar/*.aar
          **/library/build/outputs/aar/*.aar
        retention-days: 30
        if-no-files-found: warn  # Changed from 'error' to 'warn'
        overwrite: true
    
    - name: Create Release (if tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android/library/build/outputs/aar/*.aar
          android/build/outputs/aar/*.aar
          **/library/build/outputs/aar/*.aar
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
