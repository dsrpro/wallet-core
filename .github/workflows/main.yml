echo "✅ Created WalletCoreRSBindgen.h"

echo ""
echo "✅ All header files generated successfully!"
echo "=== Verification ==="
ls -lh include/TrustWalletCore/TWHRP.h
ls -lh src/rust/bindgen/WalletCoreRSBindgen.h

SCRIPT_EOF

        chmod +x /tmp/generate_headers.sh
        bash /tmp/generate_headers.sh
    
    - name: Build Rust Wallet Core Library for Android
      run: |
        echo "🔨 Building Rust Wallet Core library for Android..."
        
        # 🔑 DÉTECTER DYNAMIQUEMENT LE NDK
        if [ -d "/usr/local/lib/android/sdk/ndk/25.2.9519653" ]; then
          export ANDROID_NDK_ROOT="/usr/local/lib/android/sdk/ndk/25.2.9519653"
        elif [ -d "/usr/local/lib/android/sdk/ndk/27.3.13750724" ]; then
          export ANDROID_NDK_ROOT="/usr/local/lib/android/sdk/ndk/27.3.13750724"
        elif [ -d "/usr/local/lib/android/sdk/ndk/28.0.12674087" ]; then
          export ANDROID_NDK_ROOT="/usr/local/lib/android/sdk/ndk/28.0.12674087"
        else
          echo "❌ No NDK found! Available versions:"
          ls /usr/local/lib/android/sdk/ndk/ 2>/dev/null || echo "No NDK directory"
          exit 1
        fi
        
        echo "✅ Using NDK version: $(basename $ANDROID_NDK_ROOT)"
        
        export TOOLCHAIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
        
        # 🎯 MODERN NDK uses llvm-ar, not *-ar
        # List available tools first
        echo "=== Available NDK tools ==="
        ls "$TOOLCHAIN/bin" | grep -E "(ar|llvm-ar|clang)" | head -30
        
        # Check which AR tool exists
        if [ -f "$TOOLCHAIN/bin/llvm-ar" ]; then
          export AR="$TOOLCHAIN/bin/llvm-ar"
          echo "✅ Using llvm-ar (modern NDK)"
        elif [ -f "$TOOLCHAIN/bin/aarch64-linux-android-ar" ]; then
          export AR="$TOOLCHAIN/bin/aarch64-linux-android-ar"
          echo "✅ Using aarch64-linux-android-ar (legacy NDK)"
        else
          echo "❌ No AR tool found! Checking bin directory:"
          ls -la "$TOOLCHAIN/bin/" | grep -i ar || echo "No 'ar' files found"
          exit 1
        fi
        
        # Set compiler and other tools
        export CC="$TOOLCHAIN/bin/aarch64-linux-android23-clang"
        export CXX="$TOOLCHAIN/bin/aarch64-linux-android23-clang++"
        
        # Check for ranlib too
        if [ -f "$TOOLCHAIN/bin/llvm-ranlib" ]; then
          export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
        elif [ -f "$TOOLCHAIN/bin/aarch64-linux-android-ranlib" ]; then
          export RANLIB="$TOOLCHAIN/bin/aarch64-linux-android-ranlib"
        fi
        
        # Add toolchain to PATH
        export PATH="$TOOLCHAIN/bin:$PATH"
        
        # Critical: Export variables that Cargo/cc crate expects
        export AR_aarch64_linux_android="$AR"
        export CC_aarch64_linux_android="$CC"
        export CXX_aarch64_linux_android="$CXX"
        export RANLIB_aarch64_linux_android="${RANLIB:-$AR}"  # Fallback to AR if not found
        
        # Also set linker-specific variables
        export CARGO_TARGET_AARCH64_LINUX_ANDROID_AR="$AR"
        export CARGO_TARGET_AARCH64_LINUX_ANDROID_CC="$CC"
        export CARGO_TARGET_AARCH64_LINUX_ANDROID_CXX="$CXX"
        export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$CC"
        export CARGO_TARGET_AARCH64_LINUX_ANDROID_RANLIB="${RANLIB:-$AR}"
        
        echo "✅ AR tool: $AR"
        echo "✅ CC tool: $CC"
        
        # Verify tools exist
        if [ ! -f "$AR" ]; then
          echo "❌ AR tool not found at: $AR"
          exit 1
        fi
        if [ ! -f "$CC" ]; then
          echo "❌ CC tool not found at: $CC"
          exit 1
        fi
        
        # Aller dans le dossier rust
        cd rust
        
        # Afficher la structure
        echo "=== Rust project structure ==="
        pwd
        ls -la
        
        # Vérifier Cargo.toml
        if [ -f "Cargo.toml" ]; then
          echo "✅ Found Cargo.toml"
          head -30 Cargo.toml
        else
          echo "❌ Cargo.toml not found!"
          exit 1
        fi
        
        # Installer la cible Android
        rustup target add aarch64-linux-android
        
        # Compiler pour arm64-v8a avec cargo build standard
        echo "🔨 Compiling for aarch64-linux-android..."
        echo "Environment check:"
        echo "  AR=$AR"
        echo "  CC=$CC"
        echo "  CXX=$CXX"
        echo "  AR_aarch64_linux_android=$AR_aarch64_linux_android"
        echo "  CC_aarch64_linux_android=$CC_aarch64_linux_android"
        
        # Build with explicit environment variables
        # The cc crate will automatically pick up AR_aarch64_linux_android, etc.
        cargo build --release --target aarch64-linux-android -p wallet-core-rs
        
        # Vérifier que la bibliothèque a été créée
        echo "=== Searching for built libraries ==="
        find target/aarch64-linux-android/release -name "*.a" -o -name "*.so" 2>/dev/null | head -20
        
        if [ -f "target/aarch64-linux-android/release/libwallet_core_rs.a" ]; then
          echo "✅ Rust static library built successfully!"
          ls -lh target/aarch64-linux-android/release/libwallet_core_rs.a
        elif [ -f "target/aarch64-linux-android/release/libwallet_core_rs.so" ]; then
          echo "✅ Rust shared library built successfully!"
          ls -lh target/aarch64-linux-android/release/libwallet_core_rs.so
        else
          echo "❌ Rust library not found after build!"
          echo "Available files in target/aarch64-linux-android/release/:"
          ls -la target/aarch64-linux-android/release/ 2>/dev/null || echo "Directory not found"
          exit 1
        fi
    
    - name: Setup NDK Environment for Rust Build
      run: |
        echo "🔧 Setting up NDK environment for Rust cross-compilation..."
        
        # Détecter dynamiquement la version de NDK installée
        if [ -d "/usr/local/lib/android/sdk/ndk/25.2.9519653" ]; then
          export ANDROID_NDK_ROOT="/usr/local/lib/android/sdk/ndk/25.2.9519653"
        elif [ -d "/usr/local/lib/android/sdk/ndk/27.3.13750724" ]; then
          export ANDROID_NDK_ROOT="/usr/local/lib/android/sdk/ndk/27.3.13750724"
        elif [ -d "/usr/local/lib/android/sdk/ndk/28.0.12674087" ]; then
          export ANDROID_NDK_ROOT="/usr/local/lib/android/sdk/ndk/28.0.12674087"
        else
          echo "❌ No NDK found! Available versions:"
          ls /usr/local/lib/android/sdk/ndk/ 2>/dev/null || echo "No NDK directory"
          exit 1
        fi
        
        echo "✅ Using NDK version: $(basename $ANDROID_NDK_ROOT)"
        
        export TOOLCHAIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
        
        # Verify NDK exists
        if [ ! -d "$TOOLCHAIN/bin" ]; then
          echo "❌ NDK toolchain not found at: $TOOLCHAIN/bin"
          ls -la "$ANDROID_NDK_ROOT" || echo "NDK directory missing"
          exit 1
        fi
        
        # Set tool paths
        export AR="$TOOLCHAIN/bin/aarch64-linux-android-ar"
        export CC="$TOOLCHAIN/bin/aarch64-linux-android23-clang"
        export CXX="$TOOLCHAIN/bin/aarch64-linux-android23-clang++"
        export RANLIB="$TOOLCHAIN/bin/aarch64-linux-android-ranlib"
        export STRIP="$TOOLCHAIN/bin/aarch64-linux-android-strip"
        
        # Add toolchain to PATH
        export PATH="$TOOLCHAIN/bin:$PATH"
        
        # Critical: Export variables that Cargo/cc crate expects
        # These MUST match the format: <TOOL>_<TARGET>
        export AR_aarch64_linux_android="$AR"
        export CC_aarch64_linux_android="$CC"
        export CXX_aarch64_linux_android="$CXX"
        export RANLIB_aarch64_linux_android="$RANLIB"
        export STRIP_aarch64_linux_android="$STRIP"
        
        # Also set linker-specific variables
        export CARGO_TARGET_AARCH64_LINUX_ANDROID_AR="$AR"
        export CARGO_TARGET_AARCH64_LINUX_ANDROID_CC="$CC"
        export CARGO_TARGET_AARCH64_LINUX_ANDROID_CXX="$CXX"
        export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$CC"
        export CARGO_TARGET_AARCH64_LINUX_ANDROID_RANLIB="$RANLIB"
        
        # Write to GITHUB_ENV so they persist in subsequent steps
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
        echo "AR=$AR" >> $GITHUB_ENV
        echo "CC=$CC" >> $GITHUB_ENV
        echo "CXX=$CXX" >> $GITHUB_ENV
        echo "RANLIB=$RANLIB" >> $GITHUB_ENV
        echo "STRIP=$STRIP" >> $GITHUB_ENV
        echo "AR_aarch64_linux_android=$AR" >> $GITHUB_ENV
        echo "CC_aarch64_linux_android=$CC" >> $GITHUB_ENV
        echo "CXX_aarch64_linux_android=$CXX" >> $GITHUB_ENV
        echo "RANLIB_aarch64_linux_android=$RANLIB" >> $GITHUB_ENV
        echo "STRIP_aarch64_linux_android=$STRIP" >> $GITHUB_ENV
        echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=$AR" >> $GITHUB_ENV
        echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_CC=$CC" >> $GITHUB_ENV
        echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_CXX=$CXX" >> $GITHUB_ENV
        echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$CC" >> $GITHUB_ENV
        echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_RANLIB=$RANLIB" >> $GITHUB_ENV
        echo "PATH=$PATH" >> $GITHUB_ENV
        
        # Verify tools are accessible
        echo "✅ Verifying NDK tools..."
        which aarch64-linux-android-ar || echo "⚠️ ar not in PATH"
        which aarch64-linux-android23-clang || echo "⚠️ clang not in PATH"
        which aarch64-linux-android-ranlib || echo "⚠️ ranlib not in PATH"
        
        # Verify files exist
        echo "=== Tool verification ==="
        ls -lh "$AR" || echo "AR tool missing"
        ls -lh "$CC" || echo "CC tool missing"
        ls -lh "$CXX" || echo "CXX tool missing"
        
        echo "✅ NDK environment configured successfully!"
    
    - name: Verify NDK Installation
      run: |
        echo "NDK Path: $ANDROID_NDK_HOME"
        ls -la $ANDROID_NDK_HOME
        echo "Android SDK contents:"
        ls -la $ANDROID_SDK_ROOT
    
    - name: Explore Project Structure
      run: |
        echo "=== ROOT DIRECTORY ==="
        ls -la
        echo "=== ANDROID DIRECTORY ==="
        ls -la android/
        echo "=== SETTINGS.GRADLE ==="
        cat settings.gradle.kts || cat settings.gradle || echo "No settings.gradle found"
        echo "=== BUILD.GRADLE (ROOT) ==="
        cat build.gradle.kts || cat build.gradle || echo "No build.gradle found"
        
        # Afficher TOUS les fichiers de config Gradle
        echo "=== GRADLE PROPERTIES ==="
        if [ -f "android/gradle.properties" ]; then
          cat android/gradle.properties
        fi
        
        echo "=== BUILD.GRADLE (ANDROID) ==="
        if [ -f "android/build.gradle" ]; then
          cat android/build.gradle
        fi
        
        echo "=== WALLET-CORE BUILD.GRADLE (FULL FILE) ==="
        if [ -f "android/wallet-core/build.gradle" ]; then
          echo "📄 Complete wallet-core/build.gradle content:"
          cat android/wallet-core/build.gradle
        else
          echo "❌ wallet-core/build.gradle not found"
          echo "Available files in android/wallet-core/:"
          ls -la android/wallet-core/
        fi
        
        echo "=== WALLET-CORE-PROTO BUILD.GRADLE ==="
        if [ -f "android/wallet-core-proto/build.gradle" ]; then
          head -50 android/wallet-core-proto/build.gradle
        fi
    
    - name: Build Wallet Core Android with Gradle
      run: |
        echo "Starting Android build with Gradle..."
        
        # Aller dans le dossier android
        cd android
        
        # Afficher la structure
        echo "=== Current directory structure ==="
        pwd
        ls -la
        
        # D'abord, essayer sans --info pour avoir l'erreur claire
        echo "🔨 Building ONLY :wallet-core module (standard mode)..."
        ./gradlew :wallet-core:assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log
        BUILD_EXIT_CODE=$?
        
        # Si échec, afficher les dernières lignes avec plus de détails
        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo ""
          echo "❌ BUILD FAILED - Capturing error details..."
          echo "=== LAST 200 LINES OF LOG ==="
          tail -200 build.log
          echo ""
          echo "=== SEARCHING FOR ERRORS (grep) ==="
          grep -i "error\|failed\|exception\|could not" build.log | tail -100 || echo "No explicit errors found"
          echo ""
          echo "=== CHECKING FOR CMAKE ERRORS ==="
          grep -i "cmake\|boost\|native" build.log | tail -50 || echo "No CMake errors found"
        else
          echo "✅ BUILD SUCCESSFUL"
          echo "=== BUILD COMPLETION TIME ==="
          grep "BUILD SUCCESSFUL" build.log
        fi
        
        exit $BUILD_EXIT_CODE
    
    - name: Find Built AAR
      run: |
        echo "🔍 Searching for built AAR files..."
        
        # Chercher TOUS les fichiers .aar dans tout le projet
        echo "=== ALL AAR FILES ==="
        find . -name "*.aar" -type f 2>/dev/null | head -50
        
        # Vérifier les chemins attendus (plusieurs possibilités)
        echo "=== CHECKING EXPECTED PATHS ==="
        
        # Chemin 1: wallet-core module
        if [ -d "android/wallet-core/build/outputs/aar" ]; then
          echo "✅ Found: android/wallet-core/build/outputs/aar"
          ls -lh android/wallet-core/build/outputs/aar/
        else
          echo "❌ Not found: android/wallet-core/build/outputs/aar"
        fi
        
        # Chemin 2: library module (si existe)
        if [ -d "android/library/build/outputs/aar" ]; then
          echo "✅ Found: android/library/build/outputs/aar"
          ls -lh android/library/build/outputs/aar/
        else
          echo "❌ Not found: android/library/build/outputs/aar"
        fi
        
        # Chemin 3: app module
        if [ -d "android/app/build/outputs/aar" ]; then
          echo "✅ Found: android/app/build/outputs/aar"
          ls -lh android/app/build/outputs/aar/
        else
          echo "❌ Not found: android/app/build/outputs/aar"
        fi
        
        # Afficher structure complète si échec
        if [ $(find . -name "*.aar" | wc -l) -eq 0 ]; then
          echo "⚠️ NO AAR FILES FOUND - Showing build directories:"
          find . -type d -name "build" | head -20
        fi
    
    - name: Upload AAR Artifact
      uses: actions/upload-artifact@v4
      if: always()  # Run even if previous steps failed
      with:
        name: wallet-core-android-${{ github.run_number }}
        path: |
          android/wallet-core/build/outputs/aar/*.aar
          android/library/build/outputs/aar/*.aar
          **/wallet-core/build/outputs/aar/*.aar
          **/library/build/outputs/aar/*.aar
        retention-days: 30
        if-no-files-found: warn
        overwrite: true
    
    - name: Create Release (if tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android/library/build/outputs/aar/*.aar
          android/build/outputs/aar/*.aar
          **/library/build/outputs/aar/*.aar
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
