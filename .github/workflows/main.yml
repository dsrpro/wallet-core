name: Build Wallet Core Android AAR

on:
  workflow_dispatch:  # Permet de lancer manuellement
  push:
    tags:
      - '4.*'

jobs:
  build-android:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Wallet Core
      uses: actions/checkout@v5
      with:
        repository: trustwallet/wallet-core
        ref: 4.6.3
        fetch-depth: 0  # Fetch all history for tags
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        cmdline-tools-version: 9.0
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653'
    
    - name: Verify Available NDK Versions
      run: |
        echo "=== Checking installed NDK versions ==="
        ls -la /usr/local/lib/android/sdk/ndk/ || echo "No NDK directory yet"
        
        # Si le dossier NDK existe, lister les versions
        if [ -d "/usr/local/lib/android/sdk/ndk" ]; then
          echo "Available NDK versions:"
          ls /usr/local/lib/android/sdk/ndk/
        fi
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          python3 \
          python3-pip \
          protobuf-compiler \
          libprotobuf-dev \
          libssl-dev \
          git \
          curl \
          wget \
          libboost-all-dev
    
    - name: Setup Boost for Android
      run: |
        echo "📦 Installing Boost for Android cross-compilation..."
        
        # Télécharger Boost 1.82.0 (version stable)
        cd /tmp
        
        # Utiliser le mirror GitHub (plus fiable)
        wget -q https://github.com/boostorg/boost/releases/download/boost-1.82.0/boost-1.82.0-b2-nodocs.tar.gz \
          || wget -q https://archives.boost.io/release/1.82.0/source/boost_1_82_0.tar.gz
        
        # Vérifier quel fichier a été téléchargé
        if [ -f "boost-1.82.0-b2-nodocs.tar.gz" ]; then
          BOOST_FILE="boost-1.82.0-b2-nodocs.tar.gz"
        elif [ -f "boost_1_82_0.tar.gz" ]; then
          BOOST_FILE="boost_1_82_0.tar.gz"
        else
          echo "❌ Failed to download Boost"
          ls -la *.tar.gz || echo "No .tar.gz files found"
          exit 1
        fi
        
        echo "✅ Downloaded: $BOOST_FILE"
        tar -xzf $BOOST_FILE
        
        # Trouver le dossier extrait
        BOOST_DIR=$(find . -maxdepth 1 -type d -name "boost*" | head -1)
        if [ -z "$BOOST_DIR" ]; then
          echo "❌ Could not find extracted Boost directory"
          ls -la
          exit 1
        fi
        
        echo "📁 Extracted to: $BOOST_DIR"
        cd $BOOST_DIR
        
        # Bootstrap sans bibliothèques spécifiques (on veut juste les headers)
        ./bootstrap.sh --without-libraries=python,test || echo "⚠️ Bootstrap warning, continuing..."
        
        # Installer dans un dossier local
        ./b2 install \
          --prefix=/home/runner/work/wallet-core/wallet-core/build/local \
          --build-dir=/tmp/boost-build \
          variant=release \
          link=static \
          threading=multi \
          -j$(nproc) || echo "⚠️ Some Boost components may have failed, continuing..."
        
        # Définir les variables d'environnement pour CMake
        echo "BOOST_ROOT=/home/runner/work/wallet-core/wallet-core/build/local" >> $GITHUB_ENV
        echo "Boost_INCLUDE_DIR=/home/runner/work/wallet-core/wallet-core/build/local/include" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=/home/runner/work/wallet-core/wallet-core/build/local:$CMAKE_PREFIX_PATH" >> $GITHUB_ENV
        
        echo "✅ Boost installation completed"
        echo "📊 Boost version:"
        cat boost/version.hpp 2>/dev/null | grep "BOOST_VERSION" | head -1 || echo "Version file not found"
    
    - name: Download Protobuf Sources
      run: |
        echo "📦 Downloading Protobuf sources for Wallet Core..."
        
        # Créer le dossier de destination
        mkdir -p /home/runner/work/wallet-core/wallet-core/build/local/src/protobuf
        cd /home/runner/work/wallet-core/wallet-core/build/local/src/protobuf
        
        # Télécharger Protobuf 3.20.3 (version requise par Wallet Core)
        wget -q https://github.com/protocolbuffers/protobuf/releases/download/v3.20.3/protobuf-all-3.20.3.tar.gz
        
        if [ ! -f "protobuf-all-3.20.3.tar.gz" ]; then
          echo "❌ Failed to download Protobuf"
          exit 1
        fi
        
        echo "✅ Downloaded protobuf-all-3.20.3.tar.gz"
        tar -xzf protobuf-all-3.20.3.tar.gz
        
        # Le dossier extrait DOIT s'appeler exactement "protobuf-3.20.3"
        # car CMake cherche: build/local/src/protobuf/protobuf-3.20.3/src/google/protobuf/any.cc
        
        echo "✅ Protobuf sources extracted:"
        ls -la
        
        # Vérifier que les fichiers sources existent
        if [ -f "protobuf-3.20.3/src/google/protobuf/any.cc" ]; then
          echo "✅ Protobuf source files verified!"
          ls -lh protobuf-3.20.3/src/google/protobuf/*.cc | head -5
        else
          echo "❌ Protobuf source files not found!"
          find . -name "*.cc" | head -10
          exit 1
        fi
    
    - name: Setup Rust for Android Cross-Compilation
      run: |
        echo "🦀 Installing Rust for Wallet Core Rust components..."
        
        # Installer Rust via rustup
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
        
        # Ajouter Rust au PATH
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        
        # Vérifier l'installation
        rustc --version
        cargo --version
        
        # Ajouter les cibles Android
        echo "📦 Adding Android targets for Rust..."
        rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
        
        # Installer cargo-ndk pour la compilation Android
        cargo install cargo-ndk
        
        echo "✅ Rust installation complete!"
    
    - name: Generate Missing Header Files
      run: |
        echo "🔧 Generating missing header files..."
        
        cd /home/runner/work/wallet-core/wallet-core
        
        # Create a temporary script to generate headers
        cat > /tmp/generate_headers.sh << 'SCRIPT_EOF'
#!/bin/bash
set -e

cd /home/runner/work/wallet-core/wallet-core

# ========================================
# 1. TWHRP.h - Generate complete enum with all coins
# ========================================
echo "=== Creating TWHRP.h ==="
mkdir -p include/TrustWalletCore
cat > include/TrustWalletCore/TWHRP.h << 'EOF'
