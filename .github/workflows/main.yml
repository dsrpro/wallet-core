          echo '    XRPLEDGER = 95,'
          echo '    BITCOINTESTNET = 96,'
          echo '    LITECOINTESTNET = 97,'
          echo '    ECASHTESTNET = 98,'
          echo '};'
          echo ''
          echo '// Typedef for C compatibility - allows "enum TWHRP" syntax'
          echo 'typedef enum HRP TWHRP;'
          echo ''
          // Forward declaration of function (not inline to avoid enum forward reference issues)
          echo 'TWHRP TWCoinTypeHRP(enum TWCoinType coin);'
          echo 'inline std::string hrpName(HRP hrp) {'
          echo '    switch (hrp) {'
          echo '        case BINANCE: return "bnb";'
          echo '        case BITCOIN: return "bc";'
          echo '        case BITCOINCASH: return "bitcoincash";'
          echo '        case LITECOIN: return "ltc";'
          echo '        case DOGECOIN: return "doge";'
          echo '        case COSMOS: return "cosmos";'
          echo '        case ETHEREUM: return "eth";'
          echo '        case POLYGON: return "matic";'
          echo '        case SOLANA: return "sol";'
          echo '        case TERRA: return "terra";'
          echo '        case TERRAV2: return "terra";'
