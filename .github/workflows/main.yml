name: Build Wallet Core Android AAR

on:
  workflow_dispatch:  # Permet de lancer manuellement
  push:
    tags:
      - '4.*'

jobs:
  build-android:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Wallet Core
      uses: actions/checkout@v5
      with:
        repository: trustwallet/wallet-core
        ref: 4.6.3
        fetch-depth: 0  # Fetch all history for tags
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        cmdline-tools-version: 9.0
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653'
    
    - name: Verify Available NDK Versions
      run: |
        echo "=== Checking installed NDK versions ==="
        ls -la /usr/local/lib/android/sdk/ndk/ || echo "No NDK directory yet"
        
        # Si le dossier NDK existe, lister les versions
        if [ -d "/usr/local/lib/android/sdk/ndk" ]; then
          echo "Available NDK versions:"
          ls /usr/local/lib/android/sdk/ndk/
        fi
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          python3 \
          python3-pip \
          protobuf-compiler \
          libprotobuf-dev \
          libssl-dev \
          git \
          curl \
          wget \
          libboost-all-dev
    
    - name: Setup Boost for Android
      run: |
        echo "📦 Installing Boost for Android cross-compilation..."
        
        # Télécharger Boost 1.82.0 (version stable)
        cd /tmp
        
        # Utiliser le mirror GitHub (plus fiable)
        wget -q https://github.com/boostorg/boost/releases/download/boost-1.82.0/boost-1.82.0-b2-nodocs.tar.gz \
          || wget -q https://archives.boost.io/release/1.82.0/source/boost_1_82_0.tar.gz
        
        # Vérifier quel fichier a été téléchargé
        if [ -f "boost-1.82.0-b2-nodocs.tar.gz" ]; then
          BOOST_FILE="boost-1.82.0-b2-nodocs.tar.gz"
        elif [ -f "boost_1_82_0.tar.gz" ]; then
          BOOST_FILE="boost_1_82_0.tar.gz"
        else
          echo "❌ Failed to download Boost"
          ls -la *.tar.gz || echo "No .tar.gz files found"
          exit 1
        fi
        
        echo "✅ Downloaded: $BOOST_FILE"
        tar -xzf $BOOST_FILE
        
        # Trouver le dossier extrait
        BOOST_DIR=$(find . -maxdepth 1 -type d -name "boost*" | head -1)
        if [ -z "$BOOST_DIR" ]; then
          echo "❌ Could not find extracted Boost directory"
          ls -la
          exit 1
        fi
        
        echo "📁 Extracted to: $BOOST_DIR"
        cd $BOOST_DIR
        
        # Bootstrap sans bibliothèques spécifiques (on veut juste les headers)
        ./bootstrap.sh --without-libraries=python,test || echo "⚠️ Bootstrap warning, continuing..."
        
        # Installer dans un dossier local
        ./b2 install \
          --prefix=/home/runner/work/wallet-core/wallet-core/build/local \
          --build-dir=/tmp/boost-build \
          variant=release \
          link=static \
          threading=multi \
          -j$(nproc) || echo "⚠️ Some Boost components may have failed, continuing..."
        
        # Définir les variables d'environnement pour CMake
        echo "BOOST_ROOT=/home/runner/work/wallet-core/wallet-core/build/local" >> $GITHUB_ENV
        echo "Boost_INCLUDE_DIR=/home/runner/work/wallet-core/wallet-core/build/local/include" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=/home/runner/work/wallet-core/wallet-core/build/local:$CMAKE_PREFIX_PATH" >> $GITHUB_ENV
        
        echo "✅ Boost installation completed"
        echo "📊 Boost version:"
        cat boost/version.hpp 2>/dev/null | grep "BOOST_VERSION" | head -1 || echo "Version file not found"
    
    - name: Download Protobuf Sources
      run: |
        echo "📦 Downloading Protobuf sources for Wallet Core..."
        
        # Créer le dossier de destination
        mkdir -p /home/runner/work/wallet-core/wallet-core/build/local/src/protobuf
        cd /home/runner/work/wallet-core/wallet-core/build/local/src/protobuf
        
        # Télécharger Protobuf 3.20.3 (version requise par Wallet Core)
        wget -q https://github.com/protocolbuffers/protobuf/releases/download/v3.20.3/protobuf-all-3.20.3.tar.gz
        
        if [ ! -f "protobuf-all-3.20.3.tar.gz" ]; then
          echo "❌ Failed to download Protobuf"
          exit 1
        fi
        
        echo "✅ Downloaded protobuf-all-3.20.3.tar.gz"
        tar -xzf protobuf-all-3.20.3.tar.gz
        
        # Le dossier extrait DOIT s'appeler exactement "protobuf-3.20.3"
        # car CMake cherche: build/local/src/protobuf/protobuf-3.20.3/src/google/protobuf/any.cc
        
        echo "✅ Protobuf sources extracted:"
        ls -la
        
        # Vérifier que les fichiers sources existent
        if [ -f "protobuf-3.20.3/src/google/protobuf/any.cc" ]; then
          echo "✅ Protobuf source files verified!"
          ls -lh protobuf-3.20.3/src/google/protobuf/*.cc | head -5
        else
          echo "❌ Protobuf source files not found!"
          find . -name "*.cc" | head -10
          exit 1
        fi
    
    - name: Setup Rust for Android Cross-Compilation
      run: |
        echo "🦀 Installing Rust for Wallet Core Rust components..."
        
        # Installer Rust via rustup
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
        
        # Ajouter Rust au PATH
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        
        # Vérifier l'installation
        rustc --version
        cargo --version
        
        # Ajouter les cibles Android
        echo "📦 Adding Android targets for Rust..."
        rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
        
        # Installer cargo-ndk pour la compilation Android
        cargo install cargo-ndk
        
        echo "✅ Rust installation complete!"
    
    - name: Build Rust Wallet Core Library for Android
      run: |
        echo "🔨 Building Rust Wallet Core library for Android..."
        
        # S'assurer que les variables NDK sont correctes (version 25)
        export ANDROID_NDK_HOME="/usr/local/lib/android/sdk/ndk/25.2.9519653"
        export ANDROID_NDK_ROOT="/usr/local/lib/android/sdk/ndk/25.2.9519653"
        export ANDROID_NDK="/usr/local/lib/android/sdk/ndk/25.2.9519653"
        
        echo "✅ Using NDK: $ANDROID_NDK_ROOT"
        if [ ! -d "$ANDROID_NDK_ROOT" ]; then
          echo "❌ NDK not found! Available versions:"
          ls /usr/local/lib/android/sdk/ndk/ 2>/dev/null || echo "No NDK directory"
          exit 1
        fi
        ls -la "$ANDROID_NDK_ROOT" | head -10
        
        # Aller dans le dossier rust
        cd rust
        
        # Afficher la structure
        echo "=== Rust project structure ==="
        pwd
        ls -la
        
        # Vérifier Cargo.toml
        if [ -f "Cargo.toml" ]; then
          echo "✅ Found Cargo.toml"
          head -30 Cargo.toml
        else
          echo "❌ Cargo.toml not found!"
          exit 1
        fi
        
        # Compiler pour arm64-v8a (le premier, le plus important)
        echo "🔨 Compiling for aarch64-linux-android..."
        cargo ndk -t arm64-v8a --platform 23 -o target/aarch64-linux-android build --release
        
        # Vérifier que la bibliothèque a été créée
        if [ -f "target/aarch64-linux-android/release/libwallet_core_rs.a" ]; then
          echo "✅ Rust library built successfully!"
          ls -lh target/aarch64-linux-android/release/libwallet_core_rs.a
        else
          echo "❌ Rust library not found after build!"
          find target -name "*.a" -o -name "*.so" | head -20
          exit 1
        fi
    
    - name: Setup Environment Variables
      run: |
        # Utiliser le NDK installé par android-actions/setup-android (25.2.9519653)
        export CORRECT_NDK="/usr/local/lib/android/sdk/ndk/25.2.9519653"
        
        # Vérifier que le NDK existe
        if [ ! -d "$CORRECT_NDK" ]; then
          echo "❌ NDK not found at $CORRECT_NDK"
          echo "Available NDK versions:"
          ls /usr/local/lib/android/sdk/ndk/ 2>/dev/null || echo "No NDK directory"
          exit 1
        fi
        
        echo "✅ Found NDK at: $CORRECT_NDK"
        
        echo "ANDROID_NDK_HOME=$CORRECT_NDK" >> $GITHUB_ENV
        echo "ANDROID_NDK=$CORRECT_NDK" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$CORRECT_NDK" >> $GITHUB_ENV
        echo "NDK_HOME=$CORRECT_NDK" >> $GITHUB_ENV
        
        # Ajouter CMake au PATH
        echo "$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH
        echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
    
    - name: Verify NDK Installation
      run: |
        echo "NDK Path: $ANDROID_NDK_HOME"
        ls -la $ANDROID_NDK_HOME
        echo "Android SDK contents:"
        ls -la $ANDROID_SDK_ROOT
    
    - name: Explore Project Structure
      run: |
        echo "=== ROOT DIRECTORY ==="
        ls -la
        echo "=== ANDROID DIRECTORY ==="
        ls -la android/
        echo "=== SETTINGS.GRADLE ==="
        cat settings.gradle.kts || cat settings.gradle || echo "No settings.gradle found"
        echo "=== BUILD.GRADLE (ROOT) ==="
        cat build.gradle.kts || cat build.gradle || echo "No build.gradle found"
        
        # Afficher TOUS les fichiers de config Gradle
        echo "=== GRADLE PROPERTIES ==="
        if [ -f "android/gradle.properties" ]; then
          cat android/gradle.properties
        fi
        
        echo "=== BUILD.GRADLE (ANDROID) ==="
        if [ -f "android/build.gradle" ]; then
          cat android/build.gradle
        fi
        
        echo "=== WALLET-CORE BUILD.GRADLE (FULL FILE) ==="
        if [ -f "android/wallet-core/build.gradle" ]; then
          echo "📄 Complete wallet-core/build.gradle content:"
          cat android/wallet-core/build.gradle
        else
          echo "❌ wallet-core/build.gradle not found"
          echo "Available files in android/wallet-core/:"
          ls -la android/wallet-core/
        fi
        
        echo "=== WALLET-CORE-PROTO BUILD.GRADLE ==="
        if [ -f "android/wallet-core-proto/build.gradle" ]; then
          head -50 android/wallet-core-proto/build.gradle
        fi
    
    - name: Build Wallet Core Android with Gradle
      run: |
        echo "Starting Android build with Gradle..."
        
        # Aller dans le dossier android
        cd android
        
        # Afficher la structure
        echo "=== Current directory structure ==="
        pwd
        ls -la
        
        # D'abord, essayer sans --info pour avoir l'erreur claire
        echo "🔨 Building ONLY :wallet-core module (standard mode)..."
        ./gradlew :wallet-core:assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log
        BUILD_EXIT_CODE=$?
        
        # Si échec, afficher les dernières lignes avec plus de détails
        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo ""
          echo "❌ BUILD FAILED - Capturing error details..."
          echo "=== LAST 200 LINES OF LOG ==="
          tail -200 build.log
          echo ""
          echo "=== SEARCHING FOR ERRORS (grep) ==="
          grep -i "error\|failed\|exception\|could not" build.log | tail -100 || echo "No explicit errors found"
          echo ""
          echo "=== CHECKING FOR CMAKE ERRORS ==="
          grep -i "cmake\|boost\|native" build.log | tail -50 || echo "No CMake errors found"
        else
          echo "✅ BUILD SUCCESSFUL"
          echo "=== BUILD COMPLETION TIME ==="
          grep "BUILD SUCCESSFUL" build.log
        fi
        
        exit $BUILD_EXIT_CODE
    
    - name: Find Built AAR
      run: |
        echo "🔍 Searching for built AAR files..."
        
        # Chercher TOUS les fichiers .aar dans tout le projet
        echo "=== ALL AAR FILES ==="
        find . -name "*.aar" -type f 2>/dev/null | head -50
        
        # Vérifier les chemins attendus (plusieurs possibilités)
        echo "=== CHECKING EXPECTED PATHS ==="
        
        # Chemin 1: wallet-core module
        if [ -d "android/wallet-core/build/outputs/aar" ]; then
          echo "✅ Found: android/wallet-core/build/outputs/aar"
          ls -lh android/wallet-core/build/outputs/aar/
        else
          echo "❌ Not found: android/wallet-core/build/outputs/aar"
        fi
        
        # Chemin 2: library module (si existe)
        if [ -d "android/library/build/outputs/aar" ]; then
          echo "✅ Found: android/library/build/outputs/aar"
          ls -lh android/library/build/outputs/aar/
        else
          echo "❌ Not found: android/library/build/outputs/aar"
        fi
        
        # Chemin 3: app module
        if [ -d "android/app/build/outputs/aar" ]; then
          echo "✅ Found: android/app/build/outputs/aar"
          ls -lh android/app/build/outputs/aar/
        else
          echo "❌ Not found: android/app/build/outputs/aar"
        fi
        
        # Afficher structure complète si échec
        if [ $(find . -name "*.aar" | wc -l) -eq 0 ]; then
          echo "⚠️ NO AAR FILES FOUND - Showing build directories:"
          find . -type d -name "build" | head -20
        fi
    
    - name: Upload AAR Artifact
      uses: actions/upload-artifact@v4
      if: always()  # Run even if previous steps failed
      with:
        name: wallet-core-android-${{ github.run_number }}
        path: |
          android/wallet-core/build/outputs/aar/*.aar
          android/library/build/outputs/aar/*.aar
          **/wallet-core/build/outputs/aar/*.aar
          **/library/build/outputs/aar/*.aar
        retention-days: 30
        if-no-files-found: warn
        overwrite: true
    
    - name: Create Release (if tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android/library/build/outputs/aar/*.aar
          android/build/outputs/aar/*.aar
          **/library/build/outputs/aar/*.aar
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
