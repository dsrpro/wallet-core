          echo '    WANCHAIN = 36,'
          echo '    ZCASH = 37,'
          echo '    ZELCASH = 38,'
          echo '    ZILLIQA = 39,'
          echo '    POLYGON = 40,'
          echo '    RUNE = 41,'
          echo '    TERRAV2 = 42,'
          echo '    NATIVEEVMOS = 43,'
          echo '    NATIVEOSMOSIS = 44,'
          echo '    NATIVECRYPTOORG = 45,'
          echo '    NATIVETHORCHAIN = 46,'
          echo '    SEI = 47,'
          echo '    ACALA = 48,'
          echo '    KARURA = 49,'
          echo '    REEF = 50,'
          echo '    ALGORAND = 51,'
          echo '    APTOS = 52,'
          echo '    SUI = 53,'
          echo '    FILECOIN = 54,'
          echo '    ELROND = 55,'
          echo '    BANDCHAIN = 56,'
          echo '    MULTIVERSX = 57,'
          echo '    OASIS = 58,'
          echo '    BLUZELLE = 59,'
          echo '    IRIS = 60,'
          echo '    CRYPTOORG = 61,'
          echo '    CELESTIA = 62,'
          echo '    STARGAZE = 63,'
          echo '    JUNO = 64,'
          echo '    STRIDE = 65,'
          echo '    AXELAR = 66,'
          echo '    CRESCENT = 67,'
          echo '    KUJIRA = 68,'
          echo '    AGORIC = 69,'
          echo '    CARBON = 70,'
          echo '    FETCHAI = 71,'
          echo '    ASSETMANTLE = 72,'
