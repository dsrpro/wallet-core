          echo ''
          echo '#ifndef TWHRP_H'
          echo '#define TWHRP_H'
          echo ''
          echo '#include <string>'
          echo ''
          echo 'namespace TW {'
          echo ''
          echo '// Define the HRP enum'  
          echo 'enum HRP: int {'
          # Remove trailing comma - was causing syntax error
          echo '    UNKNOWN = 0,'
          echo '    BINANCE = 1,'
          echo '    BITCOIN = 2,'
          echo '    BITCOINCASH = 3,'
          echo '    CALLISTO = 4,'
          echo '    CARDANO = 5,'
