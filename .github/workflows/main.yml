name: Build Wallet Core Android AAR

on:
  workflow_dispatch:  # Permet de lancer manuellement
  push:
    tags:
      - '4.*'

jobs:
  build-android:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Wallet Core
      uses: actions/checkout@v5
      with:
        repository: trustwallet/wallet-core
        ref: 4.6.3
        fetch-depth: 0  # Fetch all history for tags
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        cmdline-tools-version: 9.0
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653'
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          python3 \
          python3-pip \
          protobuf-compiler \
          libprotobuf-dev \
          libssl-dev \
          git \
          curl \
          wget \
          libboost-all-dev
    
    - name: Setup Boost for Android
      run: |
        echo "📦 Installing Boost for Android cross-compilation..."
        
        # Télécharger Boost 1.82.0 (version stable)
        cd /tmp
        
        # Utiliser le mirror GitHub (plus fiable)
        wget -q https://github.com/boostorg/boost/releases/download/boost-1.82.0/boost-1.82.0-b2-nodocs.tar.gz \
          || wget -q https://archives.boost.io/release/1.82.0/source/boost_1_82_0.tar.gz
        
        # Vérifier quel fichier a été téléchargé
        if [ -f "boost-1.82.0-b2-nodocs.tar.gz" ]; then
          BOOST_FILE="boost-1.82.0-b2-nodocs.tar.gz"
        elif [ -f "boost_1_82_0.tar.gz" ]; then
          BOOST_FILE="boost_1_82_0.tar.gz"
        else
          echo "❌ Failed to download Boost"
          ls -la *.tar.gz || echo "No .tar.gz files found"
          exit 1
        fi
        
        echo "✅ Downloaded: $BOOST_FILE"
        tar -xzf $BOOST_FILE
        
        # Trouver le dossier extrait
        BOOST_DIR=$(find . -maxdepth 1 -type d -name "boost*" | head -1)
        if [ -z "$BOOST_DIR" ]; then
          echo "❌ Could not find extracted Boost directory"
          ls -la
          exit 1
        fi
        
        echo "📁 Extracted to: $BOOST_DIR"
        cd $BOOST_DIR
        
        # Bootstrap sans bibliothèques spécifiques (on veut juste les headers)
        ./bootstrap.sh --without-libraries=python,test || echo "⚠️ Bootstrap warning, continuing..."
        
        # Installer dans un dossier local
        ./b2 install \
          --prefix=/home/runner/work/wallet-core/wallet-core/build/local \
          --build-dir=/tmp/boost-build \
          variant=release \
          link=static \
          threading=multi \
          -j$(nproc) || echo "⚠️ Some Boost components may have failed, continuing..."
        
        # Définir les variables d'environnement pour CMake
        echo "BOOST_ROOT=/home/runner/work/wallet-core/wallet-core/build/local" >> $GITHUB_ENV
        echo "Boost_INCLUDE_DIR=/home/runner/work/wallet-core/wallet-core/build/local/include" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=/home/runner/work/wallet-core/wallet-core/build/local:$CMAKE_PREFIX_PATH" >> $GITHUB_ENV
        
        echo "✅ Boost installation completed"
        echo "📊 Boost version:"
        cat boost/version.hpp 2>/dev/null | grep "BOOST_VERSION" | head -1 || echo "Version file not found"
    
    - name: Setup Environment Variables
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
        echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH
        echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
    
    - name: Verify NDK Installation
      run: |
        echo "NDK Path: $ANDROID_NDK_HOME"
        ls -la $ANDROID_NDK_HOME
        echo "Android SDK contents:"
        ls -la $ANDROID_SDK_ROOT
    
    - name: Explore Project Structure
      run: |
        echo "=== ROOT DIRECTORY ==="
        ls -la
        echo "=== ANDROID DIRECTORY ==="
        ls -la android/
        echo "=== SETTINGS.GRADLE ==="
        cat settings.gradle.kts || cat settings.gradle || echo "No settings.gradle found"
        echo "=== BUILD.GRADLE (ROOT) ==="
        cat build.gradle.kts || cat build.gradle || echo "No build.gradle found"
        
        # Afficher TOUS les fichiers de config Gradle
        echo "=== GRADLE PROPERTIES ==="
        if [ -f "android/gradle.properties" ]; then
          cat android/gradle.properties
        fi
        
        echo "=== BUILD.GRADLE (ANDROID) ==="
        if [ -f "android/build.gradle" ]; then
          cat android/build.gradle
        fi
        
        echo "=== WALLET-CORE BUILD.GRADLE ==="
        if [ -f "android/wallet-core/build.gradle" ]; then
          head -100 android/wallet-core/build.gradle
        fi
    
    - name: Build Wallet Core Android with Gradle
      run: |
        echo "Starting Android build with Gradle..."
        
        # Aller dans le dossier android
        cd android
        
        # Afficher la structure
        echo "=== Current directory structure ==="
        pwd
        ls -la
        
        # Essayer UNIQUEMENT le module wallet-core (pas tout le projet)
        echo "🔨 Building ONLY :wallet-core module..."
        ./gradlew :wallet-core:assembleRelease --no-daemon --stacktrace --info 2>&1 | tee build.log
        BUILD_EXIT_CODE=$?
        
        # Si échec, essayer avec moins de logs pour voir l'erreur
        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo "⚠️ :wallet-core:assembleRelease failed, trying without --info..."
          ./gradlew :wallet-core:assembleRelease --no-daemon --stacktrace 2>&1 | tail -200 >> build.log
        fi
        
        # Afficher les erreurs
        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo "❌ BUILD FAILED"
          echo "=== DERNIÈRES LIGNES DU LOG (150 lignes) ==="
          tail -150 build.log
          echo "=== RECHERCHE DES ERREURS (grep) ==="
          grep -i "error\|failed\|exception" build.log | tail -80
        else
          echo "✅ BUILD SUCCESSFUL"
        fi
        
        exit $BUILD_EXIT_CODE
    
    - name: Find Built AAR
      run: |
        echo "🔍 Searching for built AAR files..."
        
        # Chercher TOUS les fichiers .aar dans tout le projet
        echo "=== ALL AAR FILES ==="
        find . -name "*.aar" -type f 2>/dev/null | head -50
        
        # Vérifier les chemins attendus (plusieurs possibilités)
        echo "=== CHECKING EXPECTED PATHS ==="
        
        # Chemin 1: wallet-core module
        if [ -d "android/wallet-core/build/outputs/aar" ]; then
          echo "✅ Found: android/wallet-core/build/outputs/aar"
          ls -lh android/wallet-core/build/outputs/aar/
        else
          echo "❌ Not found: android/wallet-core/build/outputs/aar"
        fi
        
        # Chemin 2: library module (si existe)
        if [ -d "android/library/build/outputs/aar" ]; then
          echo "✅ Found: android/library/build/outputs/aar"
          ls -lh android/library/build/outputs/aar/
        else
          echo "❌ Not found: android/library/build/outputs/aar"
        fi
        
        # Chemin 3: app module
        if [ -d "android/app/build/outputs/aar" ]; then
          echo "✅ Found: android/app/build/outputs/aar"
          ls -lh android/app/build/outputs/aar/
        else
          echo "❌ Not found: android/app/build/outputs/aar"
        fi
        
        # Afficher structure complète si échec
        if [ $(find . -name "*.aar" | wc -l) -eq 0 ]; then
          echo "⚠️ NO AAR FILES FOUND - Showing build directories:"
          find . -type d -name "build" | head -20
        fi
    
    - name: Upload AAR Artifact
      uses: actions/upload-artifact@v4
      if: always()  # Run even if previous steps failed
      with:
        name: wallet-core-android-${{ github.run_number }}
        path: |
          android/wallet-core/build/outputs/aar/*.aar
          android/library/build/outputs/aar/*.aar
          **/wallet-core/build/outputs/aar/*.aar
          **/library/build/outputs/aar/*.aar
        retention-days: 30
        if-no-files-found: warn
        overwrite: true
    
    - name: Create Release (if tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android/library/build/outputs/aar/*.aar
          android/build/outputs/aar/*.aar
          **/library/build/outputs/aar/*.aar
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
